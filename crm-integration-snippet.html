<!-- ════════════════════════════════════════════════════════════
     HOW TO ADD "Call with AI" BUTTON TO YOUR CRM
     ════════════════════════════════════════════════════════════

     This shows the EXACT changes to make in your Field CRM (index.html)
     so a "🤖 Call with AI" button appears next to the regular Call button
     in the lead detail drawer.

     Find this section in your Field CRM's <script type="module"> block
     (search for "dbtns" — it's in the openDet function), and add the
     new button as shown below.
-->

<script>
// ── PASTE THESE TWO LINES near the top of your script, after the firebaseConfig ──
const AI_BOT_URL = 'https://your-app-name.onrender.com';   // ← your Render URL from Step 4
const AI_BOT_API_KEY = 'your-admin-api-key-here';           // ← same value as ADMIN_API_KEY in .env


// ── ADD THIS NEW FUNCTION anywhere in your script (e.g. right after waLog) ──
window.callWithAI = async function(id, phone, name) {
  if (!phone) { toast('No phone number on this lead'); return; }
  if (!confirm('Start an AI call to ' + name + ' now?')) return;

  toast('Calling ' + name + ' with AI...');

  try {
    const response = await fetch(AI_BOT_URL + '/api/call/start', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': AI_BOT_API_KEY
      },
      body: JSON.stringify({ leadId: id, phone: phone, name: name })
    });
    const data = await response.json();
    if (data.success) {
      toast('AI is calling ' + name + ' now 📞');
    } else {
      toast('Could not start call: ' + (data.error || 'unknown error'));
    }
  } catch (err) {
    toast('Error reaching AI bot server');
    console.error(err);
  }
};
</script>
